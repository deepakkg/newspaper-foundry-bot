name: Tweet Bot

on:
  schedule:
    - cron: "30 0,4,8,12,16,20 * * *"
  workflow_dispatch:
    inputs:
      force_run:
        description: "Run even if the current slot is disabled or already logged"
        required: false
        default: true
        type: boolean

permissions:
  contents: write

concurrency:
  group: tweet-bot
  cancel-in-progress: false

jobs:
  tweet:
    runs-on: ubuntu-latest
    env:
      OLLAMA_HOST: ${{ vars.OLLAMA_HOST || 'https://ollama.com' }}
      OLLAMA_MODEL: ${{ vars.OLLAMA_MODEL || 'gemma4:31b-cloud' }}
      OLLAMA_API_KEY: ${{ secrets.OLLAMA_API_KEY }}
      TOPICS: ${{ vars.TOPICS }}
      TONES: ${{ vars.TONES }}
      MAX_TWEET_CHARS: ${{ vars.MAX_TWEET_CHARS || '230' }}
      MAX_RETRIES: ${{ vars.MAX_RETRIES || '5' }}
      OLLAMA_TIMEOUT_SECONDS: ${{ vars.OLLAMA_TIMEOUT_SECONDS || '120' }}
      POST_TO_X: ${{ vars.POST_TO_X || 'true' }}
      X_API_KEY: ${{ secrets.X_API_KEY }}
      X_API_KEY_SECRET: ${{ secrets.X_API_KEY_SECRET }}
      X_ACCESS_TOKEN: ${{ secrets.X_ACCESS_TOKEN }}
      X_ACCESS_TOKEN_SECRET: ${{ secrets.X_ACCESS_TOKEN_SECRET }}
      X_USERNAME: ${{ vars.X_USERNAME }}
      TELEGRAM_BOT_TOKEN: ${{ secrets.TELEGRAM_BOT_TOKEN }}
      TELEGRAM_CHAT_ID: ${{ secrets.TELEGRAM_CHAT_ID }}
      RUN_TIMEZONE: ${{ vars.RUN_TIMEZONE || 'Asia/Kolkata' }}
      ENABLED_RUN_SLOTS: ${{ vars.ENABLED_RUN_SLOTS || '06:00,10:00,14:00,18:00' }}
      LOG_FILE_PATH: ${{ vars.LOG_FILE_PATH || 'logs/tweet-history.md' }}

    steps:
      - name: Check out repository
        uses: actions/checkout@v6

      - name: Set up Python
        uses: actions/setup-python@v6
        with:
          python-version: "3.12"
          cache: pip

      - name: Install dependencies
        run: python -m pip install -r requirements.txt

      - name: Run tweet bot
        run: |
          if [ "${{ github.event_name }}" = "workflow_dispatch" ] && [ "${{ inputs.force_run }}" = "true" ]; then
            python tweet_generator.py --respect-schedule --force
          else
            python tweet_generator.py --respect-schedule
          fi

      - name: Commit tweet history
        run: |
          git config user.name "github-actions[bot]"
          git config user.email "41898282+github-actions[bot]@users.noreply.github.com"
          if [ ! -f "${LOG_FILE_PATH}" ]; then
            echo "No tweet history file found at ${LOG_FILE_PATH}."
            exit 0
          fi
          git add "${LOG_FILE_PATH}"
          if git diff --cached --quiet; then
            echo "No tweet history changes to commit."
          else
            git commit -m "Update tweet history"
            git push
          fi
