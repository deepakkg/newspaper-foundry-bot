name: Tweet Bot

on:
  schedule:
    # GitHub cron uses UTC. These four entries map to:
    # 06:00, 12:00, 18:00, and 22:00 in Asia/Kolkata.
    - cron: "30 0 * * *"
    - cron: "30 6 * * *"
    - cron: "30 12 * * *"
    - cron: "30 16 * * *"
  workflow_dispatch:

permissions:
  contents: write

concurrency:
  group: tweet-bot
  cancel-in-progress: false

jobs:
  tweet:
    runs-on: ubuntu-latest
    env:
      OLLAMA_HOST: ${{ vars.OLLAMA_HOST || 'https://ollama.com' }}
      OLLAMA_MODEL: ${{ vars.OLLAMA_MODEL || 'gemma4:31b-cloud' }}
      OLLAMA_API_KEY: ${{ secrets.OLLAMA_API_KEY }}
      TOPICS: ${{ vars.TOPICS }}
      TONES: ${{ vars.TONES }}
      MAX_TWEET_CHARS: ${{ vars.MAX_TWEET_CHARS || '230' }}
      MAX_RETRIES: ${{ vars.MAX_RETRIES || '5' }}
      OLLAMA_TIMEOUT_SECONDS: ${{ vars.OLLAMA_TIMEOUT_SECONDS || '120' }}
      NEWS_ENABLED: ${{ vars.NEWS_ENABLED || 'true' }}
      NEWS_RECENCY_HOURS: ${{ vars.NEWS_RECENCY_HOURS || '48' }}
      NEWS_REGION: ${{ vars.NEWS_REGION || 'US' }}
      NEWS_LANGUAGE: ${{ vars.NEWS_LANGUAGE || 'en' }}
      POST_TO_X: ${{ vars.POST_TO_X || 'true' }}
      X_API_KEY: ${{ secrets.X_API_KEY }}
      X_API_KEY_SECRET: ${{ secrets.X_API_KEY_SECRET }}
      X_ACCESS_TOKEN: ${{ secrets.X_ACCESS_TOKEN }}
      X_ACCESS_TOKEN_SECRET: ${{ secrets.X_ACCESS_TOKEN_SECRET }}
      X_USERNAME: ${{ vars.X_USERNAME }}
      TELEGRAM_BOT_TOKEN: ${{ secrets.TELEGRAM_BOT_TOKEN }}
      TELEGRAM_CHAT_ID: ${{ secrets.TELEGRAM_CHAT_ID }}
      LOG_FILE_PATH: tweet-log-store/tweet-history.md
      TWEET_HISTORY_BRANCH: tweet-history

    steps:
      - name: Check out app code
        uses: actions/checkout@v6

      - name: Check out tweet history
        uses: actions/checkout@v6
        with:
          ref: tweet-history
          path: tweet-log-store

      - name: Set up Python
        uses: actions/setup-python@v6
        with:
          python-version: "3.12"
          cache: pip

      - name: Install dependencies
        run: python -m pip install -r requirements.txt

      - name: Generate and post tweet
        run: python tweet_generator.py

      - name: Commit tweet history
        run: |
          git -C tweet-log-store config user.name "github-actions[bot]"
          git -C tweet-log-store config user.email "41898282+github-actions[bot]@users.noreply.github.com"
          git -C tweet-log-store add tweet-history.md
          if git -C tweet-log-store diff --cached --quiet; then
            echo "No tweet history changes to commit."
          else
            git -C tweet-log-store commit -m "Update tweet history"
            git -C tweet-log-store push origin "HEAD:${TWEET_HISTORY_BRANCH}"
          fi
